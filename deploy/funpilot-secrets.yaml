apiVersion: v1
kind: Secret
metadata:
  name: funpilot-secrets
  namespace: funpilot
type: Opaque
stringData:
  # LLM backend keys for non-user-owned agents and for agent configs that don't specify an LLM config
  llm-api-key: "REPLACE_ME"
  llm-auth-token: "Bearer REPLACE_ME"
  llm-auth-header: "Authorization"

  # API key of the Grafana instance in your cluster's monitoring stack
  # This needs to be a service account API key with Admin permissions
  grafana-api-key: "REPLACE_ME" 
